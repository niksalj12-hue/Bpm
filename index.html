<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BPM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0c0c0f;
  --surface:  #16161a;
  --surface2: #1e1e24;
  --border:   rgba(255,255,255,0.07);
  --accent:   #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --blue:     #7eb8f7;
  --text:     #f0f0f0;
  --muted:    rgba(255,255,255,0.28);
  --muted2:   rgba(255,255,255,0.10);
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow: hidden; touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}

body { display: flex; align-items: center; justify-content: center; }

/* ── MAIN ── */
.app {
  width: 100%; height: 100dvh;
  display: flex; flex-direction: column;
  padding: max(env(safe-area-inset-top), 16px) 24px 72px;
  padding-left: max(env(safe-area-inset-left), 24px);
  padding-right: max(env(safe-area-inset-right), 24px);
  transition: transform 0.32s cubic-bezier(.4,0,.2,1);
}
.app.shifted { transform: translateX(80vw); }

/* ── SONG NAME ── */
.song-name {
  text-align: center; font-size: 13px; font-weight: 400;
  letter-spacing: 0.12em; color: var(--blue);
  text-transform: uppercase; min-height: 18px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 4px;
}

/* ── BPM ── */
.bpm-section {
  display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
}
.bpm-arrows {
  position: absolute; left: 0;
  display: flex; flex-direction: column; gap: 6px;
}
.bpm-arrow {
  width: 34px; height: 34px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s, color .15s;
}
.bpm-arrow:active { background: var(--accent-dim); color: var(--accent); }
.bpm-arrow svg { width: 14px; height: 14px; }

.bpm-number {
  font-family: 'Space Mono', monospace;
  font-size: clamp(88px, 22vh, 152px);
  font-weight: 700; line-height: 1;
  letter-spacing: -0.04em;
  color: var(--text);
  cursor: pointer;
  transition: color .2s;
  text-align: center;
  user-select: none; -webkit-user-select: none;
}
.bpm-number.active { color: var(--accent); }
.bpm-number.manual { color: var(--blue); }
.bpm-number.dim { color: var(--muted); }

.bpm-input {
  font-family: 'Space Mono', monospace;
  font-size: clamp(88px, 22vh, 152px);
  font-weight: 700; line-height: 1; letter-spacing: -0.04em;
  color: var(--blue); background: transparent;
  border: none; border-bottom: 2px solid var(--blue);
  outline: none; width: 5ch; text-align: center; display: none;
}

.bpm-unit {
  position: absolute; right: 0; bottom: 8px;
  font-size: 11px; font-weight: 400; letter-spacing: 0.15em;
  color: var(--muted); text-transform: uppercase;
}

/* ── TAP AREA ── */
.tap-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.tap-row {
  display: flex; align-items: center;
  width: 100%; gap: 0; justify-content: space-between;
}

.nav-btn {
  flex: 1;
  height: clamp(110px, 20vh, 160px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s, color .15s, border-color .15s;
  margin: 0 10px;
}
.nav-btn:active { background: rgba(126,184,247,0.08); border-color: var(--blue); color: var(--blue); }
.nav-btn:disabled { opacity: 0.15; pointer-events: none; }
.nav-btn svg { width: 22px; height: 22px; }

.tap-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; flex-shrink: 0; }

.tap-btn {
  width:  clamp(170px, 50vw, 220px);
  height: clamp(170px, 50vw, 220px);
  border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  cursor: pointer; position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  -webkit-tap-highlight-color: transparent; user-select: none;
  touch-action: none;
  transition: border-color .1s, transform .08s;
  will-change: transform;
}
.tap-btn:active { transform: scale(0.96); }
.tap-btn.metro-pulse { animation: mpulse 0.2s ease-out forwards; }
@keyframes mpulse {
  0%   { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(200,241,53,0.4); }
  60%  { box-shadow: 0 0 0 12px rgba(200,241,53,0); }
  100% { border-color: var(--border); box-shadow: none; }
}

.tap-ripple {
  position: absolute; width: 100%; height: 100%; border-radius: 50%;
  background: var(--accent); opacity: 0; transform: scale(0); pointer-events: none;
}
.tap-ripple.go { animation: ripple .45s ease-out forwards; }
@keyframes ripple { 0% { transform:scale(0); opacity:.18; } 100% { transform:scale(1.6); opacity:0; } }

.pulse-ring {
  position: absolute; inset: -3px; border-radius: 50%;
  border: 1.5px solid var(--accent); opacity: 0; pointer-events: none;
}
.pulse-ring.go { animation: pring .4s ease-out forwards; }
@keyframes pring { 0% { opacity:.9; transform:scale(1); } 100% { opacity:0; transform:scale(1.1); } }

.tap-label {
  font-family: 'Space Mono', monospace;
  font-size: 15px; font-weight: 700; letter-spacing: 0.18em;
  color: rgba(255,255,255,0.5); pointer-events: none;
  user-select: none; -webkit-user-select: none;
}
.tap-count {
  font-family: 'Space Mono', monospace;
  font-size: 12px; letter-spacing: 0.08em;
  color: var(--muted); pointer-events: none;
  user-select: none; -webkit-user-select: none;
  min-height: 16px;
}

/* Beat dots */
.dots { display: flex; gap: 9px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted2); transition: background .1s, transform .1s;
}
.dot.lit { background: var(--accent); transform: scale(1.4); }

/* ── BOTTOM RIBBON ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding-bottom: max(env(safe-area-inset-bottom), 0px);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  z-index: 10;
}

.action-btn {
  flex: 1;
  height: 56px;
  background: none; border: none; border-right: 1px solid var(--border);
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s, color .12s;
  flex-shrink: 0;
  position: relative;
}
.action-btn:last-child { border-right: none; }
.action-btn svg { width: 20px; height: 20px; }
.action-btn:active { background: rgba(255,255,255,0.06); color: #fff; }
.action-btn:disabled { opacity: 0.2; pointer-events: none; }

/* Active state — white icon, subtle accent underline */
.action-btn.active-state {
  color: #fff;
}
.action-btn.active-state::after {
  content: '';
  position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}

/* Muted sound — dimmer */
.btn-sound.muted { color: rgba(255,255,255,0.18); }

/* ── FLASH ── */
.flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 99; }
.flash.go { animation: flash .1s ease-out forwards; }
@keyframes flash { 0% { opacity:.06; } 100% { opacity:0; } }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(80vw, 300px);
  background: var(--surface); border-right: 1px solid var(--border);
  z-index: 200; display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform .32s cubic-bezier(.4,0,.2,1);
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: max(env(safe-area-inset-top),20px) 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-title { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.sidebar-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.sidebar-close svg { width: 14px; height: 14px; }
.sidebar-empty { padding: 32px 20px; font-size: 13px; color: var(--muted); line-height: 1.7; text-align: center; }
.song-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.song-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 20px; cursor: pointer;
  transition: background .12s; border-bottom: 1px solid var(--border);
  user-select: none; -webkit-user-select: none;
}
.song-item:active { background: var(--surface2); }
.song-item.active-song { background: rgba(200,241,53,0.06); }
.song-item.dragging { opacity: .35; }
.song-item.drag-over { border-top: 2px solid var(--accent); }
.drag-handle { color: var(--muted2); font-size: 15px; cursor: grab; padding: 4px; flex-shrink: 0; touch-action: none; line-height: 1; }
.song-item-info { flex: 1; min-width: 0; }
.song-item-name { font-size: 14px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-item-bpm { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1.2; }
.song-item-del {
  width: 28px; height: 28px; border-radius: 7px;
  background: none; border: 1px solid transparent;
  color: var(--muted2); cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  transition: color .15s, border-color .15s, background .15s;
}
.song-item-del:active { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
.song-item-del svg { width: 13px; height: 13px; pointer-events: none; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 199; opacity: 0; pointer-events: none; transition: opacity .32s;
}
.overlay.open { opacity: 1; pointer-events: all; }

/* ── MODALS ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 300; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 24px max(env(safe-area-inset-bottom),28px);
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column; gap: 16px;
}
.modal-title { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.modal-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 400;
  padding: 14px 16px; outline: none; width: 100%;
  transition: border-color .15s;
}
.modal-input:focus { border-color: rgba(200,241,53,0.4); }
.modal-row { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
  padding: 13px; border-radius: 12px; cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.modal-btn.confirm {
  background: var(--accent-dim); border-color: rgba(200,241,53,0.3);
  color: var(--accent);
}
.modal-btn:active { opacity: .75; }

/* Sound grid */
.sound-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.sound-opt {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 4px 12px;
  cursor: pointer; text-align: center; color: var(--muted);
  font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 0.05em; line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s, border-color .15s, color .15s;
}
.sound-opt .ico { font-size: 20px; display: block; margin-bottom: 5px; }
.sound-opt:active { background: var(--surface); }
.sound-opt.selected { background: var(--accent-dim); border-color: rgba(200,241,53,0.35); color: var(--accent); }

/* ── LANDSCAPE ── */
@media (orientation: landscape) {
  .app {
    flex-direction: row; align-items: stretch;
    padding: 10px max(env(safe-area-inset-right),16px) 80px max(env(safe-area-inset-left),16px);
    gap: 0;
  }
  .left-col {
    display: flex; flex-direction: column; justify-content: space-between;
    flex: 0 0 38%; padding-right: 16px;
  }
  .right-col {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .tap-row { flex-direction: column; gap: 8px; }
  .nav-btn {
    flex: 0; width: clamp(60px, 12vw, 110px); height: 40px;
    border-radius: 12px; margin: 0;
  }
  .tap-btn { width: min(68vh, 52vw); height: min(68vh, 52vw); }
  .bpm-number { font-size: clamp(72px, 38vh, 180px); }
  .bpm-input  { font-size: clamp(72px, 38vh, 180px); }
  .song-name { text-align: left; }
  .bpm-unit { display: none; }
  .dots { display: none; }
}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Spellistor</span>
    <button class="sidebar-close" id="sidebarClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="sidebarEmpty" class="sidebar-empty">Inga sparade låtar.<br>Tap ett tempo och spara.</div>
  <div class="song-list" id="songList"></div>
</div>

<!-- Save modal -->
<div class="modal-backdrop" id="saveModalBg">
  <div class="modal">
    <div class="modal-title">Spara tempo</div>
    <input class="modal-input" id="modalInput" type="text" placeholder="Låtnamn…" maxlength="40">
    <div class="modal-row">
      <button class="modal-btn" id="modalCancel">Avbryt</button>
      <button class="modal-btn confirm" id="modalConfirm">Spara</button>
    </div>
  </div>
</div>

<!-- Sound picker modal -->
<div class="modal-backdrop" id="soundModalBg">
  <div class="modal">
    <div class="modal-title">Välj ljud</div>
    <div class="sound-grid" id="soundGrid"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">

  <!-- LEFT COL (portrait: full width; landscape: left panel) -->
  <div class="left-col" id="leftCol" style="display:contents">
    <div class="song-name" id="songName"></div>

    <div class="bpm-section" id="bpmSection">
      <div class="bpm-arrows" id="bpmArrows">
        <button class="bpm-arrow" id="arrowUp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="bpm-arrow" id="arrowDown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="bpm-number dim" id="bpmDisplay">—</div>
      <input class="bpm-input" id="bpmInput" type="number" min="40" max="250" inputmode="numeric">
      <span class="bpm-unit">BPM</span>
    </div>
  </div>

  <!-- TAP AREA -->
  <div class="tap-area">
    <div class="tap-row" id="tapRowPortrait">
      <button class="nav-btn" id="prevSong" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="tap-wrap">
        <div class="tap-btn" id="tapBtn">
          <div class="tap-ripple" id="tapRipple"></div>
          <div class="pulse-ring" id="pulseRing"></div>
          <div class="tap-label">TAP</div>
          <div class="tap-count" id="beatCount"></div>
        </div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div>
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <button class="nav-btn" id="nextSong" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- LANDSCAPE RIGHT COL -->
  <div class="right-col" id="rightCol" style="display:none">
    <button class="nav-btn" id="prevSongL" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="tap-wrap">
      <div class="tap-btn" id="tapBtnL">
        <div class="tap-ripple" id="tapRippleL"></div>
        <div class="pulse-ring" id="pulseRingL"></div>
        <div class="tap-label">TAP</div>
        <div class="tap-count" id="beatCountL"></div>
      </div>
    </div>
    <button class="nav-btn" id="nextSongL" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <!-- Reset -->
  <button class="action-btn" id="resetBtn" title="Nollställ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
  </button>
  <!-- Pause/Play -->
  <button class="action-btn btn-pause" id="pauseBtn" disabled title="Pausa">
    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
  </button>
  <!-- Save -->
  <button class="action-btn btn-save" id="saveBtn" disabled title="Spara">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  </button>
  <!-- Sound on/off -->
  <button class="action-btn btn-sound" id="soundBtn" title="Ljud">
    <svg id="soundIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
  </button>
  <!-- Sound picker -->
  <button class="action-btn btn-pick" id="soundPickBtn" title="Välj ljud">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </button>
  <!-- List -->
  <button class="action-btn btn-list" id="listBtn" title="Låtlista">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
</div>

<script>
// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
let audioCtx = null, soundEnabled = true, keepAliveNode = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function startKeepAlive() {
  if (keepAliveNode) return;
  const ctx = getCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  g.gain.value = 0.00001; osc.connect(g); g.connect(ctx.destination); osc.start();
  keepAliveNode = osc;
}
function b64ToAB(b64) {
  const bin = atob(b64), buf = new ArrayBuffer(bin.length), v = new Uint8Array(buf);
  for (let i=0;i<bin.length;i++) v[i]=bin.charCodeAt(i); return buf;
}
async function loadSample(key) {
  if (decoded[key]) return;
  try { decoded[key] = await getCtx().decodeAudioData(b64ToAB(SAMPLES[key])); } catch(e) {}
}
async function loadAll() { for (const k of Object.keys(SAMPLES)) await loadSample(k); }

function playSound(vol) {
  if (!soundEnabled) return; vol = vol||1;
  const buf = decoded[currentSound]; if (!buf) return;
  const src = getCtx().createBufferSource(), g = getCtx().createGain();
  src.buffer = buf; g.gain.value = vol * 1.15;
  src.connect(g); g.connect(getCtx().destination); src.start();
}

function initAudio() { getCtx(); loadAll(); }
window.addEventListener('pointerdown', initAudio, {once:true});

//  VISUALS
// ════════════════════════════════════════════
function fx(el, cls) { el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }
function triggerFlash()      { fx(flash, 'go'); }
function triggerRipple()     { fx(tapRipple, 'go'); fx(tapRippleL, 'go'); }
function triggerPulse()      { fx(pulseRing, 'go'); fx(pulseRingL, 'go'); }
function triggerMetroPulse() { fx(tapBtn, 'metro-pulse'); fx(tapBtnL, 'metro-pulse'); }
function syncCount(n)        { const t = n>0?`${n}`:''; beatCount.textContent=t; beatCountL.textContent=t; }

function lightDot() {
  dots.forEach(d=>d.classList.remove('lit'));
  dots[dotIndex%dots.length].classList.add('lit'); dotIndex++;
  setTimeout(()=>dots.forEach(d=>d.classList.remove('lit')), 160);
}

// ════════════════════════════════════════════
//  BPM
// ════════════════════════════════════════════
function calcBPM(times) {
  const iv=[]; for(let i=1;i<times.length;i++) iv.push(times[i]-times[i-1]);
  return 60000/(iv.reduce((a,b)=>a+b,0)/iv.length);
}
function clamp(v) { return Math.max(40, Math.min(250, v)); }
function adjustBPM(d) { setBPM(clamp((currentBPM||120)+d), true); }

function setBPM(bpm, manual) {
  currentBPM = Math.round(bpm);
  bpmDisplay.textContent = currentBPM;
  bpmDisplay.className = 'bpm-number ' + (manual ? 'manual' : 'active');
  saveBtn.disabled = false;
  startMetronome(currentBPM);
}

// ════════════════════════════════════════════
//  METRONOME
// ════════════════════════════════════════════
function startMetronome(bpm) {
  stopMetronome(); if (!bpm) return;
  startKeepAlive();
  metroInterval = setInterval(()=>{ playSound(0.65); triggerMetroPulse(); lightDot(); }, 60000/bpm);
  pauseBtn.disabled = false;
  setPauseIcon('pause');
}
function stopMetronome() {
  clearInterval(metroInterval); metroInterval = null;
}
function setPauseIcon(state) {
  pauseBtn.className = 'action-btn btn-pause' + (state === 'pause' ? ' active-state' : '');
  pauseIcon.innerHTML = state === 'pause'
    ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

// ════════════════════════════════════════════
//  TAP
// ════════════════════════════════════════════
let lastTapTime = 0;
function onTapGuarded(e) {
  e.preventDefault();
  const now = Date.now();
  if (now - lastTapTime < MIN_INTERVAL) return;
  lastTapTime = now;
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  onTap();
}
function onTap() {
  const now = performance.now();
  if (taps.length>0 && now-taps[taps.length-1]>RESET_MS) taps=[];
  taps.push(now);
  triggerFlash(); triggerRipple(); triggerPulse(); lightDot();
  playSound(1.0);
  const n = taps.length;
  syncCount(n);
  if (n<2) { stopMetronome(); return; }
  setBPM(calcBPM(taps), false);
  clearTimeout(resetTimer);
  resetTimer = setTimeout(()=>syncCount(0), RESET_MS*2);
}

// ════════════════════════════════════════════
//  RESET
// ════════════════════════════════════════════
function reset() {
  taps=[]; currentBPM=null; dotIndex=0;
  stopMetronome();
  bpmDisplay.textContent='—'; bpmDisplay.className='bpm-number dim';
  syncCount(0); dots.forEach(d=>d.classList.remove('lit'));
  clearTimeout(resetTimer);
  pauseBtn.disabled=true; setPauseIcon('');
  saveBtn.disabled=true;
  currentSongIndex=-1; updateSongStrip();
}

// ════════════════════════════════════════════
//  SONG NAV
// ════════════════════════════════════════════
function updateSongStrip() {
  songName.textContent = currentSongIndex>=0 && songs[currentSongIndex] ? songs[currentSongIndex].name : '';
  const atStart = currentSongIndex<=0, atEnd = currentSongIndex<0||currentSongIndex>=songs.length-1;
  prevSong.disabled=atStart; nextSong.disabled=atEnd;
  prevSongL.disabled=atStart; nextSongL.disabled=atEnd;
}
function loadSong(idx) {
  if (idx<0||idx>=songs.length) return;
  currentSongIndex=idx; const s=songs[idx];
  taps=[]; syncCount(0); setBPM(s.bpm, true);
  updateSongStrip(); renderSongList();
}
prevSong.addEventListener('click',  ()=>{ if(currentSongIndex>0) loadSong(currentSongIndex-1); });
nextSong.addEventListener('click',  ()=>{ if(currentSongIndex<songs.length-1) loadSong(currentSongIndex+1); });
prevSongL.addEventListener('click', ()=>{ if(currentSongIndex>0) loadSong(currentSongIndex-1); });
nextSongL.addEventListener('click', ()=>{ if(currentSongIndex<songs.length-1) loadSong(currentSongIndex+1); });

sidebarClose.addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

// ════════════════════════════════════════════
//  SONG LIST
// ════════════════════════════════════════════
function renderSongList() {
  songListEl.innerHTML='';
  sidebarEmpty.style.display = songs.length ? 'none' : 'block';
  songs.forEach((s,i) => {
    const item = document.createElement('div');
    item.className = 'song-item' + (i===currentSongIndex?' active-song':'');
    item.dataset.index = i;
    item.innerHTML = `
      <div class="drag-handle" data-handle>⠿</div>
      <div class="song-item-info">
        <div class="song-item-name">${s.name}</div>
        <div class="song-item-bpm">${s.bpm}</div>
      </div>
      <button class="song-item-del" data-del="${i}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    item.addEventListener('click', e=>{ if(e.target.closest('[data-del]')||e.target.dataset.handle!==undefined) return; loadSong(i); closeSidebar(); });
    item.querySelector('[data-del]').addEventListener('click', e=>{
      e.stopPropagation(); songs.splice(i,1);
      if(currentSongIndex===i) currentSongIndex=-1; else if(currentSongIndex>i) currentSongIndex--;
      saveSongs(); renderSongList(); updateSongStrip();
    });
    songListEl.appendChild(item);
  });
  initDnD();
}

// ════════════════════════════════════════════
//  DRAG & DROP
// ════════════════════════════════════════════
function initDnD() {
  const items = songListEl.querySelectorAll('.song-item');
  let src=null, srcIdx=null;
  items.forEach(item=>{
    const h = item.querySelector('[data-handle]');
    h.addEventListener('touchstart', e=>{ e.stopPropagation(); src=item; srcIdx=parseInt(item.dataset.index); item.classList.add('dragging'); }, {passive:true});
    h.addEventListener('touchmove', e=>{
      e.preventDefault();
      const t=e.touches[0], els=document.elementsFromPoint(t.clientX,t.clientY);
      const over=els.find(el=>el.classList?.contains('song-item')&&el!==src);
      items.forEach(it=>it.classList.remove('drag-over')); if(over) over.classList.add('drag-over');
    }, {passive:false});
    h.addEventListener('touchend', ()=>{
      const over=songListEl.querySelector('.drag-over');
      if(over&&src) reorder(srcIdx,parseInt(over.dataset.index));
      items.forEach(it=>it.classList.remove('dragging','drag-over')); src=null; srcIdx=null;
    }, {passive:true});
    h.addEventListener('mousedown', e=>{
      e.stopPropagation(); src=item; srcIdx=parseInt(item.dataset.index); item.classList.add('dragging');
      const mv=ev=>{ const els=document.elementsFromPoint(ev.clientX,ev.clientY); const over=els.find(el=>el.classList?.contains('song-item')&&el!==src); items.forEach(it=>it.classList.remove('drag-over')); if(over) over.classList.add('drag-over'); };
      const up=()=>{ const over=songListEl.querySelector('.drag-over'); if(over&&src) reorder(srcIdx,parseInt(over.dataset.index)); items.forEach(it=>it.classList.remove('dragging','drag-over')); src=null; srcIdx=null; window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
      window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
    });
  });
}
function reorder(from,to) {
  if(from===to) return;
  const m=songs.splice(from,1)[0]; songs.splice(to,0,m);
  if(currentSongIndex===from) currentSongIndex=to;
  else if(from<to&&currentSongIndex>from&&currentSongIndex<=to) currentSongIndex--;
  else if(from>to&&currentSongIndex>=to&&currentSongIndex<from) currentSongIndex++;
  saveSongs(); renderSongList(); updateSongStrip();
}

// ════════════════════════════════════════════
//  SAVE
// ════════════════════════════════════════════
saveBtn.addEventListener('click', ()=>{ if(!currentBPM) return; modalInput.value=''; saveModalBg.classList.add('open'); setTimeout(()=>modalInput.focus(),100); });
modalCancel.addEventListener('click', ()=>saveModalBg.classList.remove('open'));
modalConfirm.addEventListener('click', ()=>{
  const name = modalInput.value.trim() || `Låt ${songs.length+1}`;
  songs.push({name, bpm:currentBPM}); currentSongIndex=songs.length-1;
  saveSongs(); saveModalBg.classList.remove('open'); renderSongList(); updateSongStrip();
});
modalInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();modalConfirm.click();} if(e.key==='Escape') saveModalBg.classList.remove('open'); });
saveModalBg.addEventListener('click', e=>{ if(e.target===saveModalBg) saveModalBg.classList.remove('open'); });

// ════════════════════════════════════════════
//  SOUND PICKER
// ════════════════════════════════════════════
function renderSoundGrid() {
  soundGrid.innerHTML='';
  Object.entries(SAMPLE_META).forEach(([key,meta])=>{
    const btn=document.createElement('button');
    btn.className='sound-opt'+(key===currentSound?' selected':'');
    btn.innerHTML=`<span class="ico">${meta.icon}</span>${meta.label}`;
    btn.addEventListener('click',()=>{
      currentSound=key; localStorage.setItem('bpm_sound',key);
      loadSample(key).then(()=>playSound(0.8)); renderSoundGrid();
    });
    soundGrid.appendChild(btn);
  });
}
soundPickBtn.addEventListener('click',()=>{ renderSoundGrid(); soundModalBg.classList.add('open'); });
soundModalBg.addEventListener('click', e=>{ if(e.target===soundModalBg) soundModalBg.classList.remove('open'); });

// ════════════════════════════════════════════
//  MANUAL BPM
// ════════════════════════════════════════════
function openBpmInput() {
  if(!currentBPM) setBPM(120,true);
  bpmDisplay.style.display='none'; bpmInput.style.display='inline-block';
  bpmInput.value=currentBPM; setTimeout(()=>{bpmInput.focus();bpmInput.select();},50);
}
function closeBpmInput() {
  const v=parseInt(bpmInput.value,10);
  if(!isNaN(v)&&v>=40&&v<=250) setBPM(v,true);
  bpmInput.style.display='none'; bpmDisplay.style.display='';
}
let tapOnNum=false;
bpmDisplay.addEventListener('touchstart',()=>tapOnNum=true,{passive:true});
bpmDisplay.addEventListener('touchend',e=>{if(tapOnNum){e.preventDefault();openBpmInput();}tapOnNum=false;});
bpmDisplay.addEventListener('click', openBpmInput);
bpmInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();closeBpmInput();}if(e.key==='Escape'){bpmInput.style.display='none';bpmDisplay.style.display='';}});
bpmInput.addEventListener('blur', closeBpmInput);

arrowUp.addEventListener('click',   e=>{e.stopPropagation();adjustBPM(1);});
arrowDown.addEventListener('click', e=>{e.stopPropagation();adjustBPM(-1);});
function makeRepeat(btn,d){
  let t,iv;
  btn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();adjustBPM(d);t=setTimeout(()=>{iv=setInterval(()=>adjustBPM(d),80);},400);},{passive:false});
  btn.addEventListener('touchend',()=>{clearTimeout(t);clearInterval(iv);});
}
makeRepeat(arrowUp,1); makeRepeat(arrowDown,-1);

// ════════════════════════════════════════════
//  BUTTONS
// ════════════════════════════════════════════
tapBtn.addEventListener('pointerdown',  onTapGuarded);
tapBtnL.addEventListener('pointerdown', onTapGuarded);

resetBtn.addEventListener('click', reset);

pauseBtn.addEventListener('click',()=>{
  if(metroInterval){
    clearInterval(metroInterval); metroInterval=null; setPauseIcon('play');
  } else if(currentBPM) { startMetronome(currentBPM); }
});

soundBtn.addEventListener('click',()=>{
  soundEnabled=!soundEnabled;
  soundBtn.classList.toggle('muted',!soundEnabled);
  soundIcon.innerHTML = soundEnabled
    ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>'
    : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
});

document.addEventListener('keydown',e=>{
  if(document.activeElement===bpmInput||document.activeElement===modalInput) return;
  if(e.code==='Space'){e.preventDefault();onTap();}
  if(e.code==='Escape') reset();
  if(e.code==='ArrowUp'){e.preventDefault();adjustBPM(1);}
  if(e.code==='ArrowDown'){e.preventDefault();adjustBPM(-1);}
  if(e.code==='ArrowLeft'&&currentSongIndex>0) loadSong(currentSongIndex-1);
  if(e.code==='ArrowRight'&&currentSongIndex<songs.length-1) loadSong(currentSongIndex+1);
});

updateSongStrip();
</script>
</body>
</html>
